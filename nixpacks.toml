[phases.setup]
nixPkgs = ["python313", "python313Packages.pip"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r backend/requirements.txt"
]

[phases.start]
cmds = ["cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"]

[metadata]
images = ["python3.13"]