[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r backend/requirements.txt"]

[phases.start]
cmds = ["cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"]

[metadata]
images = ["python3.11"]

[environment]
PYTHON_VERSION = "3.11"