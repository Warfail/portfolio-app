<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Rezky Agung Kurniawan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <nav class="admin-nav">
        <div class="nav-container">
            <div class="nav-logo"><a href="/admin">Admin Panel</a></div>
            <div class="nav-actions">
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <ul class="sidebar-menu">
                <li class="active" data-section="profile"><i class="fas fa-user"></i> Profile</li>
                <li data-section="skills"><i class="fas fa-code"></i> Skills</li>
                <li data-section="experience"><i class="fas fa-briefcase"></i> Experience</li>
                <li data-section="projects"><i class="fas fa-folder"></i> Projects</li>
                <li data-section="contacts"><i class="fas fa-envelope"></i> Messages</li>
            </ul>
        </aside>

        <main class="admin-content">
            <!-- Profile Section -->
            <section id="profile-section" class="admin-section active">
                <h2>Profile Management</h2>
                <form id="profile-form" class="admin-form">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="admin-name" required />
                    </div>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="admin-title" required />
                    </div>
                    <div class="form-group">
                        <label>About</label>
                        <textarea id="admin-about" rows="5" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="admin-email" required />
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="admin-phone" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="admin-location" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>LinkedIn</label>
                            <input type="url" id="admin-linkedin" />
                        </div>
                        <div class="form-group">
                            <label>GitHub</label>
                            <input type="url" id="admin-github" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Profile Image</label>
                        <input type="file" id="admin-profile-image" accept="image/*" />
                        <div id="profile-image-preview"></div>
                    </div>
                    <button type="submit" class="btn btn-primary-filled">Save Profile</button>
                </form>
            </section>

            <!-- Skills Section -->
            <section id="skills-section" class="admin-section">
                <h2>Skills Management</h2>
                <form id="skill-form" class="admin-form inline-form">
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="skill-name" placeholder="Skill Name" required />
                        </div>
                        <div class="form-group">
                            <select id="skill-category" required>
                                <option value="">Category</option>
                                <option value="Infrastructure & System Administration">Infrastructure & System Administration</option>
                                <option value="Networking">Networking</option>
                                <option value="Virtualization">Virtualization</option>
                                <option value="IT Operations">IT Operations</option>
                                <option value="Development">Development</option>
                                <option value="Soft Skills">Soft Skills</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="number" id="skill-level" placeholder="Level (1-100)" min="1" max="100" />
                        </div>
                        <button type="submit" class="btn btn-primary-filled">Add Skill</button>
                    </div>
                </form>
                <div id="skills-list" class="admin-list"></div>
            </section>

            <!-- Experience Section -->
            <section id="experience-section" class="admin-section">
                <h2>Experience Management</h2>
                <form id="experience-form" class="admin-form">
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" id="exp-company" required />
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <input type="text" id="exp-position" required />
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="exp-location" />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" id="exp-start-date" required />
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" id="exp-end-date" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="exp-current" /> Currently working here</label>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="exp-description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Achievements (comma separated)</label>
                        <input type="text" id="exp-achievements" placeholder="Achievement 1, Achievement 2, ..." />
                    </div>
                    <button type="submit" class="btn btn-primary-filled">Save Experience</button>
                </form>
                <div id="experience-list" class="admin-list"></div>
            </section>

            <!-- Projects Section -->
            <section id="projects-section" class="admin-section">
                <h2>Projects Management</h2>
                <form id="project-form" class="admin-form">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="project-title" required />
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="project-description" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Technologies (comma separated)</label>
                        <input type="text" id="project-technologies" placeholder="React, Node.js, MongoDB, ..." />
                    </div>
                    <div class="form-group">
                        <label>Project Image</label>
                        <input type="file" id="project-image" accept="image/*" />
                        <div id="project-image-preview"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Project URL</label>
                            <input type="url" id="project-url" />
                        </div>
                        <div class="form-group">
                            <label>GitHub URL</label>
                            <input type="url" id="project-github" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="project-featured" /> Featured Project</label>
                    </div>
                    <button type="submit" class="btn btn-primary-filled">Save Project</button>
                </form>
                <div id="projects-list" class="admin-list"></div>
            </section>

            <!-- Contacts Section -->
            <section id="contacts-section" class="admin-section">
                <h2>Messages</h2>
                <div id="contacts-list" class="admin-list"></div>
            </section>
        </main>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
